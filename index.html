function generateJSON() {
            var outputText = document.getElementById('output').innerText;
            var commands = outputText.split('\n')
                                     .map(cmd => cmd.trim().replace("Head: ", "").replace("Hand: ", "").replace("Foot: ", "").replace("Body: ", "").replace("Orb: ", "").replace("Rope: ", ""))
                                     .filter(cmd => cmd);
            var jsonString = JSON.stringify(commands, null, 2);
            var blob = new Blob([jsonString], { type: 'application/json' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'commands.json';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        var headers = ["Head", "Hand", "Foot", "Body", "Orb", "Rope"];
        for (var i = 1; i <= 6; i++) {
            createDropdownTable("container" + i, headers[i - 1]);
        }
        var dropdowns = document.querySelectorAll("select");
        dropdowns.forEach(function(dropdown) {
            dropdown.addEventListener("change", updateOutput);
        });
        updateOutput();
