
    <!DOCTYPE html>
    <html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../dark.css">
        <title>Data Bank</title>
        
    <script>
    function updateRefinements(weaponId, level) {
        var refinementDataElement = document.getElementById(weaponId + '_data');
        var stats = refinementDataElement.getAttribute('data-level' + level);
        
        var statsArray = stats.split(',').map(stat => parseFloat(stat.trim()));
        
        var refinementsElement = document.getElementById(weaponId + '_refinements');
        var originalDescription = refinementsElement.getAttribute('data-original-description');
        
        statsArray.forEach((stat, index) => {
            var placeholder_i = new RegExp(`#${index + 1}\\[i\\]`, 'g');
            var placeholder_f1 = new RegExp(`#${index + 1}\\[f1\\]`, 'g');

            var formattedStat = stat;

            originalDescription = originalDescription.replace(placeholder_i, formattedStat);
            originalDescription = originalDescription.replace(placeholder_f1, formattedStat);
        });

        refinementsElement.innerHTML = originalDescription;
    }
    function initializeSkills() {
        var dropdowns = document.querySelectorAll('select[onchange^="updateRefinements"]');
        dropdowns.forEach(dropdown => {
            dropdown.value = 1;
            dropdown.dispatchEvent(new Event('change'));
        });
    }
    </script>

    </head>
    <body onload="initializeSkills()">
<h1 style="margin-bottom:0px">robinwings</h1><small>Some scalings are in decimals instead of percentage :)</small><hr>
<div style="margin-top:20px; margin-bottom:10px">
  <button onclick="window.location.href='../avatar.html'">Character</button>  <button onclick="window.location.href='../weapons.html'">Lightcone</button>  <button onclick="window.location.href='../relics.html'">Relic Set</button>  </div>

        <p><strong>ID:</strong> 20006<br>
           <strong>Rarity:</strong> 3*<br>

            <li><strong>Max HP:</strong> 741.00</li>
            <li><strong>Max ATK:</strong> 370.00</li>
            <li><strong>Max DEF:</strong> 265.00</li>
        </ul>

        <h2>Ability</h2>
        <ul>
            <li>

                    <option value="1">1</option>

                </select>
                <div id="20006_refinements" data-original-description="Increases the wearer's Ultimate DMG by <b><unbreak>#1[i]</unbreak></b>.">

                </div>
                <div id="20006_data" style="display:none;" data-level1="0.28" data-level2="0.35" data-level3="0.42" data-level4="0.49" data-level5="0.56" data-levelid="2, 0, 0, 0, 6" >
                </div>
            </li>
        </ul>
    </body>
